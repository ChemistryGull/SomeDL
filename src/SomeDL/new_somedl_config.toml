#
# Configuration file for SomeDL
#
# Need more info? Visit:    https://github.com/ChemistryGull/SomeDL
# Need help? Ask here:      https://github.com/ChemistryGull/SomeDL/discussions
# Tips or ideas? Tell me:   https://github.com/ChemistryGull/SomeDL/discussions/categories/ideas
# Found a bug? Tell me:     https://github.com/ChemistryGull/SomeDL/issues
# Like SomeDL? Leave a star on my GitHub repo!
#
# Want to revert to default configs? Regenerate config with somedl --generate-config. If config regeneration fails, try to delete this old config before trying again.
#

[metadata]

# Default = true (for all)
# Enable or disable individual metadata fields.
# Changes apply to all songs downloaded after saving this file.
lyrics = true
copyright = true
isrc = true
genre = true


[download]

# Set the downloaded file extension
# Default: "mp3"
# Recommended: "best", "best/opus", "best/m4a", "opus" or "m4a"
#
# Options:
#   "best"        Let yt-dlp download the highest quality format and extract it without reencoding (usually opus, sometimes m4a)
#   "best/opus"   Same as best, but prefere opus (if opus is not available, it will opt for other formats, mostly m4a)
#   "best/m4a"    Same as best, but preferes m4a
#   "opus"        Tries to download opus. If opus is not available, download the next best format and transcode it to opus
#   "m4a"         Tries to download m4a. If m4a is not available, download the next best format and transcode it to m4a
#   "mp3"         Downloads the best format and transcodes it to mp3
#   "vorbis"      Downloads the best format and transcodes it to ogg
#   "flac"        Downloads the best format and transcodes it to flac
#
# General info about the available formats:
# Youtube serves opus and m4a files. Usually there is no transcoding needed, so there is no quality loss. If you can, use one of them (best, best/opus, best/m4a, opus, m4a).
#   opus:           Supported by many modern Audio players. Usually no quality loss.
#   m4a:            Supported by most modern Audio players. Usually no quality loss. (Codec usually AAC-LC)
#   mp3:            Best compatability, but requires transcoding, so there is some quality loss.
#   ogg/vorbis:     Only use ogg if you have a specific reason to. Requires transcoding, so there is quality loss.
#   flac:           Not recommended! You are limited to the quality youtube provides, reencoding to flac just results in huge file sizes (10x) with no benefits! If you want the best quality available, choose best, best/opus, best/m4a, opus or m4a.
format = "mp3"

# Set the transcoding quality. Integer between 0-9.
# Default = 5
#
# Only affects formats that need to be transcoded (mp3, ogg/vorbis, flac always. opus and m4a only when transcoded)
# Lower number = better quality
# Best = 0      Larger file size
# Worst = 9     Smaller file size, noticable bad quality
# Medium = 5    About the same file size, sensible yt-dlp default
quality = 5

# Set the ID3 tag version (ID3v2.x), only applicable to mp3.
# Default = 3 (for best compatability)
# If you are not sure what this means, leave the default value.
#
# Options:
#  3    Best compatibility — works with pretty much all music players
#  4    Newer standard, Not properly supported by some music players, e.g Samsung Music (fully supported by VLC)
id3_version = 3

# Directory to save downloaded songs to.
# Default: "." (folder the command is called from)
# Always use forward slashes "/", even on Windows. Do not use backslashes
# Example on Windows: C:/Users/vboxuser/Music (NOT C:\Users\vboxuser\Music)
output_dir = "."

# File naming template for downloaded songs.
#
# Default: "{artist} - {song}"
#
# Use forward slashes to sort songs into subfolders (Do not use backslashes!).
# Example:  "{artist}/{year} - {album}/{track_pos} - {song}"
# Example:  "{artist}/{album}/{artist} - {song}"
# Example:  "{artist}/{artist} - {song}"
#
# Required placeholders (must be included!):
#  {artist}      Song artist, performer or band
#  {song}        Song title
#
# Optional additional placeholders:
#  {album}       Album title
#  {year}        Release date of the song in YYYY
#  {track_pos}   Track position within the album
#  {track_count} Total number of tracks in the album
output = "{artist} - {song}"

# Path to a cookies file, or browser to pull cookies from.
# Needed for age-restricted content.
# See https://github.com/ChemistryGull/SomeDL for details.
#
# It is not recommended to permanently set this option here.
# Instead, use the "--cookies-from-browser firefox" flag when downloading age-restricted songs.
# (Logging into YouTube with an age-verified Firefox account works best.)
#
# Examples:
#   cookies_path = "/home/user/cookies.txt"
#   cookies_from_browser = "firefox"
cookies_path = ""
cookies_from_browser = ""


[api]


# Disabling one of the following APIs will result in missing metadata!
musicbrainz = true       # Default = true  | Needed for genre and artist MBID
genius = true            # Default = true  | Needed for album info for certain songs
deezer = true            # Default = true  | Needed for music label (copyright) and ISRC

max_retry = 3   # Default = 3  | Only affects musicbrainz retries

# Additional API settings
#
# Improves album metadata accuracy by cross-checking YouTube's album info with Genius.
# YouTube lists some songs as singles even if they belong to an album. When enabled,
# SomeDL queries the Genius API for the actual album name, which is then used by
# ytmusicapi to fetch correct album metadata and cover art.
# Default = true
genius_album_check = true


[logging]

# Logging level
# Default = "INFO"
#
# Options:
#   "WARNING" or "ERROR"   Reduce console output, only show problems
#   "INFO"                 Show general progress information (recommended)
#   "DEBUG"                Show all logs, same as using the --verbose flag
level = "INFO"

# Minimum number of songs in a download session before a download report is generated.
# Default = 2;
#
# To disable the download report entirely, set this to a large value (e.g. 1000000).
# To always show a report, set this to 1 (or use the -R flag directly in the CLI).
download_report = 2

# DO NOT CHANGE THE VALUE BELOW!
config_version = 1
