#
# Configuration file for SomeDL
#
# Need more info? Visit:    https://github.com/ChemistryGull/SomeDL
# Need help? Ask here:      https://github.com/ChemistryGull/SomeDL/discussions
# Tips or ideas? Tell me:   https://github.com/ChemistryGull/SomeDL/discussions/categories/ideas
# Found a bug? Tell me:     https://github.com/ChemistryGull/SomeDL/issues
# Like SomeDL? Leave a star on my GitHub repo!
#
# Want to revert to default configs? Regenerate config with somedl --generate-config. If config regeneration fails, try to delete this old config before trying again.
# This config file is auto-updated when SomeDL is updated. Your settings will be preserverd, but any comments and restructuring done by you will be undone.
#

[metadata]

# Enable or disable individual metadata fields.
# Changes apply to all songs downloaded after saving this file.
lyrics = true               # Default = true
copyright = true            # Default = true
isrc = true                 # Default = true
genre = true                # Default = true

album_artist = true         # Default = true    | You should not set this value to false.
multiple_artists = false    # Default = false   | Puts all involved artists/bands in the artist data field. The "artist" name in the output template will still only contain the primary artist.
artist_separator = "; "     # Default = "; "    | Options: ";" or "/". Do not use "+" or "&" or "|". Separator used to join multiple artists in a single metadata field. Only applies to mp3 and m4a. Opus, ogg and Flac support multiple artist fields.

ffmpeg_metadata =  false    # Default = false   | Set to true to keep the metadata set by ffmpeg (usually just some encoding infromation, not used by music players)

cover_art_file = false      # Default = false   | Set to true to download a cover.jpg file in the same folder as the song (only one cover is created per folder, seperation by album is recommended if you want to use this setting)


# Lyrics:

# Default: "plain"
# Options: "synced", "plain", "both", "synced_if_available", "none"
# (synced_if_available means synced, but plain, unsynced lyrics as fallback)
lyrics_type = "plain"

# Store synced lyrics in metadata
# Default: true
synced_lyrics_metadata = true

# .lrc sidecar file
# Default: false
# Set true if you want to genreate a .lrc file containing the synced lyrics for each song.
lrc_file = false

# Default: false
# Writes synced lyrics into unsynced lyrics field for mp3.
# Workaround to make synced lyrics work for mp3 in some media players
# Only used for mp3, does not affect other formats
lyrics_id3_synced_uslt_fallback = false

# Set the lyrics source
# Options:
#  "lrclib"         Great free source for lyrics. Has synced lyrics for many songs
#  "youtube"        Youtube provides some lyris. Does not have synced lyrics.
#  "none"           Only none as fallback source if you dont want to wait the extra second for the other service to look for lyrics
#                   none should also be used when only wanting synced lyrics
# 
# Do not use the same source twice.
lyrics_source = "lrclib"                # Default = "lrclib" (keep this if you need synced lyrics!)
lyrics_fallback_source = "youtube"      # Default = "youtube"


[download]

# Set the downloaded file extension
# Default: "mp3"
# Recommended: "best", "best/opus", "best/m4a", "opus" or "m4a"
#
# Options:
#   "best"        Let yt-dlp download the highest quality format and extract it without reencoding (usually opus, sometimes m4a)
#   "best/opus"   Same as best, but prefere opus (if opus is not available, it will opt for other formats, mostly m4a)
#   "best/m4a"    Same as best, but preferes m4a
#   "opus"        Tries to download opus. If opus is not available, download the next best format and transcode it to opus
#   "m4a"         Tries to download m4a. If m4a is not available, download the next best format and transcode it to m4a
#   "mp3"         Downloads the best format and transcodes it to mp3
#   "vorbis"      Downloads the best format and transcodes it to ogg
#   "flac"        Downloads the best format and transcodes it to flac
#
# General info about the available formats:
# Youtube serves opus and m4a files. Usually there is no transcoding needed, so there is no quality loss. If you can, use one of them (best, best/opus, best/m4a, opus, m4a).
#   opus:           Supported by many modern Audio players. Usually no quality loss.
#   m4a:            Supported by most modern Audio players. Usually no quality loss. (Codec usually AAC-LC)
#   mp3:            Best compatability, but requires transcoding, so there is some quality loss.
#   ogg/vorbis:     Only use ogg if you have a specific reason to. Requires transcoding, so there is quality loss.
#   flac:           Not recommended! You are limited to the quality youtube provides, reencoding to flac just results in huge file sizes (10x) with no benefits! If you want the best quality available, choose best, best/opus, best/m4a, opus or m4a.
format = "mp3"

# Set the transcoding quality. Integer between 0-9.
# Default = 5
#
# Only affects formats that need to be transcoded (mp3, ogg/vorbis, flac always. opus and m4a only when transcoded)
# Lower number = better quality
# Best = 0      Larger file size
# Worst = 9     Smaller file size, noticable bad quality
# Medium = 5    About the same file size, sensible yt-dlp default
quality = 5

# Set the ID3 tag version (ID3v2.x), only applicable to mp3.
# Default = 3 (for best compatability)
# If you are not sure what this means, leave the default value.
#
# Options:
#  3    Best compatibility - works with pretty much all music players
#  4    Newer standard, Not properly supported by some music players, e.g Samsung Music (fully supported by VLC)
id3_version = 3

# Directory to save downloaded songs to.
# Default: "." (folder the command is called from)
# Always use forward slashes "/", even on Windows. Do not use backslashes
# Example on Windows: C:/Users/vboxuser/Music (NOT C:\Users\vboxuser\Music)
output_dir = "."

# File naming template for downloaded songs.
#
# Default: "{artist} - {song}"
#
# Use forward slashes to sort songs into subfolders (Do not use backslashes!).
# Example:  "{album_artist}/{year} - {album}/{track_pos} - {song}"
# Example:  "{album_artist}/{album}/{artist} - {song}"
# Example:  "{album_artist}/{artist} - {song}"
#
# Required placeholders (must be included!):
#  {artist} or {album_artist}   Song artist, performer or band. 
#                               -> Use {album_artist} if you only want to avoid songs with featuring artist being split up into different folders
#  {song}                       Song title
#
# Optional additional placeholders:
#  {album}          Album title
#  {year}           Release date of the song in YYYY
#  {track_pos}      Track position within the album
#  {track_count}    Total number of tracks in the album
output = "{artist} - {song}"

# Number of concurrent yt-dlp downloaders
# Default = 2
# Options: 1-10
# 
# Too many concurrent downloaders when downloading large libraries may cause problems.
# (Getting your requests rate limited, your account banned if using cookies or your IP temporarily blocked)
# For downloading small playlists (10-50 Songs), an increased number of downloaders should be fine, but use at your own risk.
# For very large downloads, keep the number of downloaders low (1-2)
number_downloaders = 2

# Size of the queue containing prefetched metadata waiting for downloading
# Default = 2
# Options: 0-10
#
# The total number of songs that appear in the downloader window at the same time is:
# queue_size + number_downloaders + 1 (currently processed song)
# Setting this number to something higher than the number of downloaders will likely not improve download speed.
queue_size = 2

# Path to a cookies file, or browser to pull cookies from.
# Needed for age-restricted content.
# See https://github.com/ChemistryGull/SomeDL for details.
#
# It is not recommended to permanently set this option here.
# Instead, use the "--cookies-from-browser firefox" flag when downloading age-restricted songs.
# (Logging into YouTube with an age-verified account on Firefox works best.)
#
# Examples:
#   cookies_path = "/home/user/cookies.txt"
#   cookies_from_browser = "firefox"
cookies_path = ""
cookies_from_browser = ""

# When a URL contains both song (v=) and playlist (list=) IDs, should SomeDL download the full playlist or only the single video?
# prefer_playlist = false -> Only download song
# prefer_playlist = true -> Download full playlist
#
# Default = false
prefer_playlist = false

# Set true to always download the full album for each song. Equivalent to the --fetch-albums flag
# Default = false
fetch_albums = false

# When true, skip songs that are already present in the output location (checking by artist name and song title)
# Set false e.g. if you want to have duplicates of the same songs as single & album versions.
# Files that are redownloaded will be overwritten if set false.
# Can be temporarily disabled using the --skip-file-check flag.
# Default = true
check_if_file_exists = true

# Add song IDs to a archive file. Only download videos that have not been added to the archive already.
# Enter the path to a archive file (/path/to/archive.txt). The name and filetype of the archive do not matter.
# Default = "" (Disabled)
download_archive = ""


[api]

# Disabling one of the following APIs will result in missing metadata!
musicbrainz = true       # Default = true  | Needed for genre and artist MBID
genius = true            # Default = true  | Needed for album info for certain songs
deezer = true            # Default = true  | Needed for music label (copyright) and ISRC

max_retry = 3   # Default = 3  | Only affects musicbrainz retries

# Additional API settings
#
# Improves album metadata accuracy by cross-checking YouTube's album info with Genius.
# YouTube lists some songs as singles even if they belong to an album. When enabled,
# SomeDL queries the Genius API for the actual album name, which is then used by
# ytmusicapi to fetch correct album metadata and cover art.
# Default = true
genius_album_check = true


[logging]

# Logging level (since 1.2.0)
# Default = 4
#
# Servity loosely inspired by Syslog.
# All messages with a equal or lower log_level will be displayed.
#
# Options:
# EMERGENCY 0   Currently unused
# ALERT     1   Currently unused
# CRITICAL  2   Critical conditions     (Unhandled exceptions)
# ERROR     3   Error conditions        (e.g Network errors)
# WARNING   4   Important warnings      (DEFAULT e.g. YT-DLP warnings, invalid video ids, ...)
# NOTICE    5   Secondary warnings      (e.g some metadata not being found)
# INFO      6   Informational messages  (e.g successful fetching of genre data)
# DEBUG     7   Debug-level messages    (Shows all messages)
log_level = 4

# Minimum number of songs in a download session before a download report is generated.
# Default = 2;
#
# To disable the download report entirely, set this to a large value (e.g. 1000000).
# To always show a report, set this to 1 (or use the -R flag directly in the CLI).
download_report = 2

# DO NOT CHANGE THE VALUE BELOW!
config_version = 5
